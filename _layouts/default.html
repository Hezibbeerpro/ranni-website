<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{{ page.description | default: site.description }}">
    <meta name="keywords" content="{{ page.keywords | default: 'רני באר, משחקים, סרטים, פיפא, מיינקרפט, רובלוקס' }}">
    <meta name="author" content="{{ site.author }}">
    
    <meta property="og:title" content="{{ page.title | default: site.title }}">
    <meta property="og:description" content="{{ page.description | default: site.description }}">
    <meta property="og:type" content="website">
    <meta property="og:url" content="{{ page.url | absolute_url }}">
    <meta property="og:image" content="{{ '/assets/images/ball.jpg' | absolute_url }}">
    <meta property="og:site_name" content="{{ site.title }}">
    <meta property="og:locale" content="he_IL">
    
    {% if page.canonical %}
    <link rel="canonical" href="{{ page.canonical }}">
    {% else %}
    <link rel="canonical" href="{{ page.url | absolute_url }}">
    {% endif %}
    
    <title>{{ page.title | default: site.title }}</title>
    <link rel="icon" type="image/jpeg" href="{{ '/assets/images/ball.jpg' | relative_url }}">
    
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "Person",
        "name": "רני באר",
        "url": "{{ '/' | absolute_url }}",
        "sameAs": []
    }
    </script>
    
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; min-height: 100vh; }
        header, footer { background-color: #0033A0; color: #FFD700; padding: 15px; text-align: center; }
        header a { color: #FFD700; text-decoration: none; margin: 0 15px; font-weight: bold; font-size: 1.2rem; }
        main { flex: 1; padding: 20px; }
        .content-center { text-align: center; padding: 40px; }
        .profile-image { width: 150px; }
    </style>
</head>
<body>

    <header>
        <nav>
            <a href="{{ '/' | relative_url }}">רני באר</a>
            <a href="{{ '/movies.html' | relative_url }}">סרטים</a>
            <a href="{{ '/games.html' | relative_url }}">משחקים</a>
        </nav>
    </header>

    <main>
        {{ content }}
    </main>

    <footer>
        <p>שמחים שביקרתם פה</p>
    </footer>

</body>
</html>
