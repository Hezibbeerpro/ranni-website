<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{{ page.description | default: site.description }}">
    <meta name="keywords" content="{{ page.keywords | default: 'רני באר, משחקים, סרטים, פיפא, מיינקרפט, רובלוקס' }}">
    <meta name="author" content="{{ site.author }}">
    <meta name="language" content="he">
    
    <!-- Open Graph Tags -->
    <meta property="og:title" content="{{ page.title | default: site.title }}">
    <meta property="og:description" content="{{ page.description | default: site.description }}">
    <meta property="og:type" content="website">
    <meta property="og:url" content="{{ site.url }}{{ page.url }}">
    <meta property="og:image" content="{{ site.url }}/assets/images/maccabi_logo.png">
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="{{ page.title | default: site.title }}">
    <meta name="twitter:description" content="{{ page.description | default: site.description }}">
    
    <!-- Canonical URL -->
    {% if page.canonical %}
    <meta rel="canonical" href="{{ page.canonical }}">
    {% else %}
    <meta rel="canonical" href="{{ site.url }}{{ page.url }}">
    {% endif %}
    
    <title>{{ page.title | default: site.title }}</title>
    <link rel="icon" type="image/png" href="{{ '/assets/images/maccabi_logo.png' | relative_url }}">
    
    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "Person",
        "name": "רני באר",
        "url": "{{ site.url }}",
        "sameAs": [],
        "jobTitle": "תלמיד",
        "homeLocation": {
            "@type": "Place",
            "address": {
                "@type": "PostalAddress",
                "addressCountry": "israel"
            }
        }
    }
    </script>
    
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        header, footer {
            background-color: #0033A0; /* כחול מכבי תל אביב */
            color: #FFD700; /* צהוב מכבי תל אביב */
            padding: 15px;
            text-align: center;
        }
        header a {
            color: #FFD700;
            text-decoration: none;
            margin: 0 15px;
            font-weight: bold;
            font-size: 1.2rem;
        }
        main {
            flex: 1;
            padding: 20px;
        }
        
        /* Content section styling */
        .content-center {
            text-align: center;
            padding: 40px;
        }
        .content-spaced {
            margin-top: 50px;
        }
        .card {
            border: 3px solid #0033A0;
            border-radius: 15px;
            padding: 20px;
            display: inline-block;
            background-color: #fdfdfd;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .card img {
            width: 100px;
            border-radius: 50%;
            margin-bottom: 15px;
        }
        .card h2 {
            color: #0033A0;
        }
        .card-link {
            display: inline-block;
            background-color: #FFD700;
            color: #0033A0;
            padding: 12px 25px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 5px;
            border: 2px solid #0033A0;
            transition: 0.3s;
        }
        .card-link:hover {
            background-color: #FFC700;
            transform: scale(1.05);
        }
        .video-section {
            margin-top: 30px;
            text-align: center;
        }
        .profile-image {
            width: 150px;
        }
    </style>
</head>
<body>

    <header>
        <nav>
            <a href="{{ '/' | relative_url }}">רני באר</a>
            <a href="{{ '/movies.html' | relative_url }}">סרטים</a>
            <a href="{{ '/games.html' | relative_url }}">משחקים</a>
        </nav>
    </header>

    <main>
        {{ content }}
    </main>

    <footer>
        <p>שמחים שביקרתם פה</p>
    </footer>

</body>
</html>
