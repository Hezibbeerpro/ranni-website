<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{{ page.description | default: site.description }}">
    <meta name="keywords" content="{{ page.keywords | default: 'רני באר, משחקים, סרטים, פיפא, מיינקרפט, רובלוקס' }}">
    <meta name="author" content="{{ site.author }}">
    <meta name="language" content="he">
    
    <!-- Open Graph Tags -->
    <meta property="og:title" content="{{ page.title | default: site.title }}">
    <meta property="og:description" content="{{ page.description | default: site.description }}">
    <meta property="og:type" content="website">
    <meta property="og:url" content="{{ site.url }}{{ page.url }}">
    <meta property="og:image" content="{{ page.image | default: site.url }}/assets/images/maccabi_logo.png">
    <meta property="og:image:alt" content="{{ page.image-alt | default: 'רני באר - אתר אישי' }}">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:site_name" content="{{ site.title }}">
    <meta property="og:locale" content="he_IL">
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{{ page.title | default: site.title }}">
    <meta name="twitter:description" content="{{ page.description | default: site.description }}">
    <meta name="twitter:image" content="{{ page.image | default: site.url }}/assets/images/maccabi_logo.png">
    <meta name="twitter:image:alt" content="{{ page.image-alt | default: 'רני באר - אתר אישי' }}">
    
    <!-- Canonical URL -->
    {% if page.canonical %}
    <meta rel="canonical" href="{{ page.canonical }}">
    {% else %}
    <meta rel="canonical" href="{{ site.url }}{{ page.url }}">
    {% endif %}
    
    <title>{{ page.title | default: site.title }}</title>
    <link rel="icon" type="image/png" href="{{ '/assets/images/maccabi_logo.png' | relative_url }}">
    
    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "Person",
        "name": "רני באר",
        "url": "{{ site.url }}",
        "sameAs": [],
        "jobTitle": "תלמיד",
        "homeLocation": {
            "@type": "Place",
            "address": {
                "@type": "PostalAddress",
                "addressCountry": "israel"
            }
        }
    }
    </script>
    
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        header, footer {
            background-color: #0033A0; /* כחול מכבי תל אביב */
            color: #FFD700; /* צהוב מכבי תל אביב */
            padding: 15px;
            text-align: center;
        }
        header a {
            color: #FFD700;
            text-decoration: none;
            margin: 0 15px;
            font-weight: bold;
            font-size: 1.2rem;
        }
        main {
            flex: 1;
            padding: 20px;
        }
        
        /* Content section styling */
        .content-center {
            text-align: center;
            padding: 40px;
        }
        .content-spaced {
            margin-top: 50px;
        }
        .card {
            border: 3px solid #0033A0;
            border-radius: 15px;
            padding: 20px;
            display: inline-block;
            background-color: #fdfdfd;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .card img {
            width: 100px;
            border-radius: 50%;
            margin-bottom: 15px;
        }
        .card h2 {
            color: #0033A0;
        }
        .card-link {
            display: inline-block;
            background-color: #FFD700;
            color: #0033A0;
            padding: 12px 25px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 5px;
            border: 2px solid #0033A0;
            transition: 0.3s;
        }
        .card-link:hover {
            background-color: #FFC700;
            transform: scale(1.05);
        }
        .video-section {
            margin-top: 30px;
            text-align: center;
        }
        .video-section iframe {
            max-width: 100%;
            height: auto;
        }
        .video-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            max-width: 800px;
            margin: 0 auto;
        }
        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        .profile-image {
            width: 150px;
        }
        
        /* Mobile Responsive Styles */
        @media (max-width: 768px) {
            body {
                font-size: 14px;
            }
            header {
                padding: 10px;
            }
            header a {
                display: inline-block;
                margin: 5px 8px;
                font-size: 1rem;
            }
            main {
                padding: 15px;
            }
            .content-center {
                padding: 20px 15px;
                text-align: center;
            }
            .card {
                display: block;
                width: 100%;
                max-width: 400px;
                margin: 15px auto;
                padding: 15px;
            }
            .card img {
                width: 80px;
            }
            .card h2 {
                font-size: 1.3rem;
                margin: 10px 0;
            }
            .card p {
                font-size: 0.95rem;
            }
            .card-link {
                display: block;
                padding: 10px 15px;
                margin-top: 10px;
                width: 100%;
                box-sizing: border-box;
            }
            .profile-image {
                width: 100px;
                max-width: 100%;
            }
            h1 {
                font-size: 1.8rem;
                margin: 15px 0;
            }
            h2 {
                font-size: 1.4rem;
            }
            .video-section {
                margin: 20px 0;
            }
        }
        
        /* Game area responsive */
        #game-area {
            min-height: 500px;
        }
        
        @media (max-width: 480px) {
            header a {
                display: block;
                padding: 8px 0;
                font-size: 0.95rem;
            }
            main {
                padding: 10px;
            }
            .content-center {
                padding: 15px 10px;
            }
            .card {
                max-width: 100%;
                padding: 12px;
                margin: 10px 0;
            }
            .card img {
                width: 70px;
            }
            h1 {
                font-size: 1.5rem;
            }
            .profile-image {
                width: 80px;
            }
        }
    </style>
</head>
<body>

    <header>
        <nav>
            <a href="{{ '/' | relative_url }}">רני באר</a>
            <a href="{{ '/movies.html' | relative_url }}">סרטים</a>
            <a href="{{ '/games.html' | relative_url }}">משחקים</a>
        </nav>
    </header>

    <main>
        {{ content }}
    </main>

    <footer>
        <p>שמחים שביקרתם פה</p>
    </footer>

</body>
</html>
