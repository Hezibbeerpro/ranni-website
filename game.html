<h1 style="text-align: center;">הנגיחות של רני</h1>
<p style="text-align: center;">לחץ על הכדור כדי לנגוח בו לפני שהוא נופל לרצפה! ככל שתצליח יותר, המהירות תעלה.</p>

<div id="game-area" style="position: relative; width: 100%; max-width: 400px; height: 500px; background-color: #87CEEB; margin: 0 auto; overflow: hidden; border: 4px solid #0033A0; border-radius: 10px; cursor: crosshair;">
    
    <div style="position: absolute; top: 10px; right: 10px; font-size: 24px; font-weight: bold; color: #0033A0; z-index: 10; background: rgba(255,255,255,0.5); padding: 5px; border-radius: 5px;">
        נקודות: <span id="score">0</span>
    </div>

    <img id="ball" src="{{ '/assets/images/ball.jpg' | relative_url }}" 
         onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'80\' height=\'80\'><circle cx=\'40\' cy=\'40\' r=\'38\' fill=\'%23FFD700\' stroke=\'%230033A0\' stroke-width=\'4\'/></svg>'"
         alt="כדור" 
         style="position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 80px; height: 80px; cursor: pointer; user-select: none; z-index: 5; border-radius: 50%; object-fit: cover;" 
         draggable="false">

    <div id="game-over-screen" style="display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 51, 160, 0.9); z-index: 20; text-align: center; padding-top: 150px; color: white;">
        <h2 style="font-size: 36px; color: #FFD700;">המשחק נגמר!</h2>
        <p style="font-size: 24px;">השגת <span id="final-score">0</span> נקודות</p>
        <button onclick="startGame()" style="margin-top: 20px; padding: 15px 30px; font-size: 20px; background-color: #FFD700; color: #0033A0; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.3s;">נסה שוב</button>
    </div>
</div>

<script>
    const ball = document.getElementById('ball');
    const scoreDisplay = document.getElementById('score');
    const finalScoreDisplay = document.getElementById('final-score');
    const gameOverScreen = document.getElementById('game-over-screen');
    const gameArea = document.getElementById('game-area');
    
    let score = 0;
    let ballY = 0; 
    let speed = 2.5; 
    let gameLoop;
    let isPlaying = false;

    function startGame() {
        score = 0;
        ballY = 0;
        speed = 2.5; 
        isPlaying = true;
        
        scoreDisplay.innerText = score;
        gameOverScreen.style.display = 'none';
        ball.style.top = '0px';
        ball.style.left = '50%';
        
        cancelAnimationFrame(gameLoop);
        update();
    }

    function update() {
        if (!isPlaying) return;

        ballY += speed;
        ball.style.top = ballY + 'px';

        // בדיקה אם הכדור עבר את גובה אזור המשחק (500 פיקסלים)
        if (ballY > 420) { 
            endGame();
        } else {
            gameLoop = requestAnimationFrame(update);
        }
    }

    function headBall(e) {
        if (!isPlaying) return;

        // מניעת התנהגות ברירת מחדל בנייד
        if (e) e.preventDefault();

        score++;
        scoreDisplay.innerText = score;
        
        // החזרת הכדור למעלה ושינוי מיקום אופקי אקראי כדי שיהיה מעניין
        ballY = 0;
        let randomLeft = Math.floor(Math.random() * 70) + 15; // בין 15% ל-85% מהרוחב
        ball.style.left = randomLeft + '%';
        
        // הגברת קושי
        speed += 0.3;
    }

    function endGame() {
        isPlaying = false;
        finalScoreDisplay.innerText = score;
        gameOverScreen.style.display = 'block';
    }

    // מאזינים ללחיצות
    ball.addEventListener('mousedown', headBall);
    ball.addEventListener('touchstart', headBall);

    // התחלה אוטומטית
    window.onload = startGame;
</script>
